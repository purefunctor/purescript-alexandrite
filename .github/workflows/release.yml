name: Cargo Build & Release

on:
  push:
    tags:
      - v[0-9]+.*

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build-and-release:
    needs: create-release
    name: Build & Release
    runs-on: ${{ matrix.os }}
    permissions:
      attestations: write
      contents: write
      id-token: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl

          - os: macos-latest
            target: universal-apple-darwin

          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install cross-compilation tools
        uses: taiki-e/setup-cross-toolchain-action@v1
        if: startsWith(matrix.os, 'ubuntu')
        with:
          target: ${{ matrix.target }}
      
      - name: Build and Release
        id: release
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: purescript-analyzer,purescript-alexandrite
          package: purescript-alexandrite
          archive: purescript-alexandrite-$target
          include: README.md,LICENSE,ACKNOWLEDGEMENTS.md,THIRDPARTY.toml
          leading-dir: true
          locked: true
          target: ${{ matrix.target }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest release archive
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ steps.release.outputs.tar || steps.release.outputs.zip }}

  test-installers:
    needs: build-and-release
    permissions:
      attestations: read
      contents: read
    uses: ./.github/workflows/installers.yml
    with:
      version: ${{ github.ref_name }}
